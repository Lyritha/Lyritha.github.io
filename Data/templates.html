<template id="timeline-item">
    <button data-role="button" class="timeline-item flex-horizontal">

            <img data-role="icon" src="" class="timeline-icon" alt="Icon" />
            <div>
                <p data-role="title"></p>
                <p data-role="sub" class="sub-p text-grey"></p>
            </div>
        </div>
        <div class="timeline-line"></div>

            <p>Period</p>
